<div class="post-detail" *ngIf="post">
    <div class="post-detail-container">
      <button class="back-btn" (click)="goBack()">
        ← Назад к статьям
      </button>
      
      <div class="post-header">
        <div class="post-tags">
          <span class="tag" *ngFor="let tag of post.tags">#{{tag}}</span>
        </div>
        
        <h1 class="post-title">{{post.title}}</h1>
        
        <div class="post-meta">
          <div class="post-author">
            <img [src]="post.authorAvatar" class="author-avatar">
            <div>
              <div class="author-name">{{post.author}}</div>
              <div class="post-date">{{getFormattedDate(post.date)}}</div>
            </div>
          </div>
          
          <div class="post-stats">
            <span>⏱️ {{post.readTime}} мин чтения</span>
            <button class="like-btn" (click)="likePost()">
              ❤️ {{post.likes}}
            </button>
          </div>
        </div>
      </div>
      
      <div class="post-image" *ngIf="post.imageUrl">
        <img [src]="post.imageUrl" [alt]="post.title">
      </div>
      
      <div class="post-content">
        <p>{{post.description}}</p>
        <p>Здесь будет полный текст статьи. Пока что это демо-версия.</p>
      </div>
      
      <div class="post-footer">
        <div class="post-country">
          <span>📍 {{post.country}}</span>
        </div>
      </div>
    </div>
  </div>
