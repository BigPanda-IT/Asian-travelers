<div class="publish-card">
    <div class="publish-header">
      <div class="publish-icon">📝</div>
      <h3>Поделиться находкой</h3>
      <button class="close-btn" (click)="close()">✕</button>
    </div>
    
    <form [formGroup]="publishForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Заголовок *</label>
        <input type="text" formControlName="title" placeholder="Например: Секретный водопад на Бали">
      </div>
      
      <div class="form-group">
        <label>Краткое описание *</label>
        <textarea rows="4" formControlName="description" placeholder="Расскажите о месте..."></textarea>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Страна</label>
          <select formControlName="country">
            <option *ngFor="let country of countries" [value]="country">{{country}}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Время чтения (мин)</label>
          <input type="number" formControlName="readTime" min="1" max="30">
        </div>
      </div>
      
      <div class="form-group">
        <label>Теги (через запятую)</label>
        <input type="text" formControlName="tags" placeholder="путешествия, азия, пляж">
      </div>
      
      <div class="form-group">
        <label>URL фото</label>
        <input type="url" formControlName="imageUrl" (input)="onImageUrlChange()" placeholder="https://...">
        <div class="image-preview" *ngIf="previewUrl">
          <img [src]="previewUrl" alt="Preview">
        </div>
      </div>
      
      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="close()">Отмена</button>
        <button type="submit" class="btn-submit" [disabled]="!publishForm.valid">
          ✨ Опубликовать
        </button>
      </div>
    </form>
  </div>
